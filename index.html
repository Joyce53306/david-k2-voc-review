<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>David K2 VOC Review</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fffde7; font-family: 'Comic Sans MS', cursive; }
        #game-area { width: 100vw; height: 100vh; position: relative; }
        .balloon { position: absolute; bottom: -300px; cursor: pointer; transition: transform 0.2s; }
        .balloon img { width: 180px; height: 180px; border-radius: 50%; border: 6px solid #ffcc80; background: white; object-fit: cover; }
        #lesson-select { position: fixed; top: 20px; left: 20px; z-index: 10; font-size: 20px; padding: 10px; border-radius: 10px; background: white; }
        @keyframes float { to { bottom: 100vh; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<select id="lesson-select" onchange="loadLesson()">
    <option value="1">Lesson 1 (Colors)</option>
    <option value="2">Lesson 2 (Senses)</option>
    <option value="3">Lesson 3 (Shapes)</option>
    <option value="4">Lesson 4 (Things)</option>
    <option value="5">Lesson 5 (Transport)</option>
    <option value="6">Lesson 6 (Combo)</option>
    <option value="7">Lesson 7 (Food/Nature)</option>
    <option value="8">Lesson 8 (Family)</option>
    <option value="9">Lesson 9 (Actions)</option>
    <option value="10">Lesson 10 (Days)</option>
</select>

<div id="game-area"></div>

<!-- 強制預載入音樂 -->
<audio id="victory-sound" src="victory.mp3" preload="auto"></audio>

<script>
    const lessons = {
        1: ["black", "blue", "brown", "green", "orange", "pink", "purple", "red", "white", "yellow"],
        2: ["taste", "smell", "listen", "look", "touch"],
        3: ["circle", "square", "triangle", "rectangle"],
        4: ["balloons", "kittens", "roller-skates", "shoes"],
        5: ["bike", "boat", "broom", "car", "scooter", "train"],
        6: ["blue-t-shirt", "green-peppers", "orange-tomatoes", "red-hats", "yellow-bees"],
        7: ["salt", "apples", "apple-tree", "chicken", "cow", "eggs", "milk", "ocean"],
        8: ["dad", "mom", "grandpa", "grandma", "david", "brother", "sister", "rusty"],
        9: ["sing", "play-dress-up", "dance", "do-yoga"],
        10: ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"]
    };

    let currentLessonWords = [];
    let currentWord = "";
    let preferredVoice = null;

    // 挑一個比較自然的英文語音，改善 monotone 的問題
    function pickVoice() {
        const voices = window.speechSynthesis.getVoices();
        preferredVoice =
            voices.find(v => /en-US/i.test(v.lang) && /Google|Natural|Samantha/i.test(v.name)) ||
            voices.find(v => /en-US/i.test(v.lang)) ||
            voices[0] || null;
    }
    window.speechSynthesis.onvoiceschanged = pickVoice;
    pickVoice();

    function speak(word) {
        // 關鍵修正：先清空佇列，避免疊音、被截斷造成 monotone
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(word);
        msg.rate = 0.7;
        msg.pitch = 1.1;
        if (preferredVoice) msg.voice = preferredVoice;
        window.speechSynthesis.speak(msg);
    }

    function loadLesson() {
        const val = document.getElementById('lesson-select').value;
        currentLessonWords = [...lessons[val]];
        document.getElementById('game-area').innerHTML = "";
        currentLessonWords.forEach(w => createBalloon(w));
        setTimeout(nextRound, 800);
    }

    function createBalloon(word) {
        let b = document.createElement('div');
        b.className = 'balloon';
        b.style.left = Math.random() * 70 + 5 + 'vw';
        // 氣球速度：25 到 35 秒
        b.style.animation = `float ${Math.random() * 10 + 25}s linear infinite`;
        b.innerHTML = `<img src="${word}.png" onerror="this.src='default.png'">`;

        b.onclick = () => {
            // 關鍵修正：拿掉點擊時的發音，只有換新回合才會念，避免疊音
            if (word === currentWord) {
                b.remove();
                currentLessonWords = currentLessonWords.filter(w => w !== word);
                if (currentLessonWords.length > 0) {
                    nextRound();
                } else {
                    winGame();
                }
            }
        };
        document.getElementById('game-area').appendChild(b);
    }

    function nextRound() {
        if (currentLessonWords.length === 0) return;
        currentWord = currentLessonWords[Math.floor(Math.random() * currentLessonWords.length)];
        speak(currentWord);
    }

    function winGame() {
        confetti();
        const sound = document.getElementById('victory-sound');
        sound.currentTime = 0;
        sound.play().catch(e => {
            // 印出真正的錯誤代碼，方便判斷是不是 victory.mp3 找不到（404）
            console.log("音樂播放失敗，原因：", e.name, e.message);
        });
    }

    window.onload = loadLesson;
</script>
</body>
</html>
